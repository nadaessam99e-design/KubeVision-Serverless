apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - serving-core.yaml
  - net-istio.yaml
  
#! All patches inside seving-core.yaml except config-istio  
patches:
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: config-domain
        namespace: knative-serving
      data:
        creative.opik.net: ""

  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: config-network
        namespace: knative-serving
      data:
        ingress-class: "istio.ingress.networking.knative.dev"
        default-external-scheme: "https"
        domain-template: "{{.Name}}.{{.Domain}}"

  #! this inside net-istio.yaml
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: config-istio
        namespace: knative-serving
      data:
        gateway.istio-system.kubevision-gateway: "istio-ingressgateway.istio-system.svc.cluster.local"

  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: config-gc
        namespace: knative-serving
      data:
        retain-since-create-time: "48h"
        retain-since-last-active-time: "15h"
        min-non-active-revisions: "2"
        max-non-active-revisions: "5"