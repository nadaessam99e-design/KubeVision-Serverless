apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-stack-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "17" 
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/AdhamAyad/KubeVision-Serverless-Platform.git'
    targetRevision: main
    path: Kubernetes/observability-stack
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true