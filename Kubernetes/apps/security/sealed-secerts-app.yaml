apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2" 
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/AdhamAyad/KubeVision-Serverless-Platform.git'
    targetRevision: main
    path: Kubernetes/secrets
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: actions-runner-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true