apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: knative-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8" 
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/AdhamAyad/KubeVision-Serverless-Platform.git'
    targetRevision: main
    path: Kubernetes/knative
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: knative-serving
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true